# ════════════════════════════════════════════════
# BEO — Docker Compose
# Single-node topology (BLU-01)
# Keys injected via .env only — never volume-mounted (BLU-08)
# ════════════════════════════════════════════════

services:

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec"]
    volumes:
      - ./data/redis:/data
    networks:
      - beo

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./litellm_config.yaml:/app/config.yaml
      - ./data/litellm/db.sqlite:/app/db.sqlite
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    depends_on:
      - redis
    networks:
      - beo

  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    restart: unless-stopped
    env_file: .env
    environment:
      - LITELLM_API_BASE=http://litellm:4000/v1
    volumes:
      - ${HOME}/.openclaw:/root/.openclaw
      - ${HOME}/self-improving:/root/self-improving
      - ./openclaw.json:/root/.openclaw/openclaw.json
    depends_on:
      - litellm
    networks:
      - beo

networks:
  beo:
    driver: bridge
