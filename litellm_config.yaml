# ════════════════════════════════════════════════
# BEO — LiteLLM Configuration
# Model aliases, budgets, semantic cache, timeouts
# ════════════════════════════════════════════════

general_settings:
  master_key: "${LITELLM_MASTER_KEY}"
  database_url: "${LITELLM_DATABASE_URL}"

router_settings:
  router_strategy: simple-shuffle    # switch to least-busy at 200+ queries/day (BLU-14)

model_list:

  # ── Tier 1 — The Brain (Gemini promo key pool) ──
  - model_name: tier-1-brain
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: "${GEMINI_KEY_1}"
    model_info:
      max_tokens: 1000000
      max_budget: 10
  - model_name: tier-1-brain
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: "${GEMINI_KEY_2}"
    model_info:
      max_tokens: 1000000
      max_budget: 10
  - model_name: tier-1-brain
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: "${GEMINI_KEY_3}"
    model_info:
      max_tokens: 1000000
      max_budget: 10

  # ── Tier 2 — The Desk ──
  - model_name: tier-2-desk
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: "${GEMINI_KEY_1}"
    model_info:
      max_tokens: 1000000
      timeout: 30

  # ── Tier 3 — The Field ──
  - model_name: tier-3-field
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: "${GEMINI_KEY_1}"
    model_info:
      max_tokens: 1000000
      timeout: 90
      max_parallel_requests: 5    # Minion concurrency cap (BLU-22)

  # ── Tier 4 — The Oracle ──
  - model_name: tier-4-extraction
    litellm_params:
      model: openrouter/google/gemini-2.5-pro
      api_key: "${OPENROUTER_API_KEY}"
    model_info:
      max_tokens: 1000000
      timeout: 300

  # ── Tier 5 — The VIP ──
  - model_name: tier-5-vip
    litellm_params:
      model: openrouter/anthropic/claude-opus-4
      api_key: "${OPENROUTER_API_KEY}"
    model_info:
      max_tokens: 200000
      timeout: 300

  # ── Nano-router (pre-flight classifier + compaction) ──
  - model_name: tier-nano-router
    litellm_params:
      model: gemini/gemini-2.0-flash-lite
      api_key: "${GEMINI_KEY_1}"
    model_info:
      max_tokens: 1000000

litellm_settings:
  cache: true
  cache_params:
    type: redis
    host: redis
    port: 6379
    similarity_threshold: 0.92
    supported_call_types: ["acompletion", "completion"]
    embedding_model: "gemini/text-embedding-004"
